version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: storyforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: storyforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U storyforge']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: storyforge-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://storyforge:${DB_PASSWORD:-change-me-in-production}@db:5432/storyforge
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: storyforge-client
    restart: unless-stopped
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: storyforge-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - client
      - server

volumes:
  postgres_data:

networks:
  default:
    name: storyforge-network
